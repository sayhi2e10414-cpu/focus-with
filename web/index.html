<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <title>FocusWith</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow" id="todayLabel"></div>
          <h1>FocusWith</h1>
          <p data-i18n="Choose the next meaningful thing. Do only that.">Choose the next meaningful thing. Do only that.</p>
        </div>
        <div class="top-actions">
          <button class="language-button" id="languageButton" data-action="switch-locale" title="Switch to Simplified Chinese" aria-label="Switch to Simplified Chinese">中</button>
          <button class="icon-button" id="notifyButton" title="Enable browser notifications" data-i18n-title="Enable browser notifications">◌</button>
          <button class="secondary" data-action="import-plan" data-i18n="Import plan">Import plan</button>
          <button class="primary" data-action="new-task" data-i18n="＋ New task">＋ New task</button>
        </div>
      </header>

      <nav class="segmented" aria-label="Focus sections" data-i18n-aria-label="Focus sections">
        <button class="active" data-tab="focus" data-i18n="Focus">Focus</button>
        <button data-tab="projects" data-i18n="Projects">Projects</button>
        <button data-tab="companion" data-i18n="Companion">Companion</button>
        <button data-tab="stats" data-i18n="Statistics">Statistics</button>
        <button data-tab="settings" data-i18n="Settings">Settings</button>
      </nav>

      <main id="app" aria-live="polite">
        <div class="loading" data-i18n="Loading Focus…">Loading Focus…</div>
      </main>
    </div>

    <dialog id="modal">
      <form method="dialog" id="modalForm">
        <div class="dialog-head">
          <div>
            <div class="eyebrow" id="modalEyebrow">Focus</div>
            <h2 id="modalTitle" data-i18n="Edit">Edit</h2>
          </div>
          <button value="cancel" class="close-button" aria-label="Close" data-i18n-aria-label="Close">×</button>
        </div>
        <div id="modalBody"></div>
        <div class="dialog-actions">
          <button value="cancel" class="secondary" data-i18n="Cancel">Cancel</button>
          <button value="default" class="primary" id="modalSubmit" data-i18n="Save">Save</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>
    <script src="/assets/i18n.js" defer></script>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
