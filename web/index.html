<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <title>FocusWith</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow" id="todayLabel"></div>
          <h1>FocusWith</h1>
          <p>Choose the next meaningful thing. Do only that.</p>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="notifyButton" title="Enable browser notifications">◌</button>
          <button class="secondary" data-action="import-plan">Import plan</button>
          <button class="primary" data-action="new-task">＋ New task</button>
        </div>
      </header>

      <nav class="segmented" aria-label="Focus sections">
        <button class="active" data-tab="focus">Focus</button>
        <button data-tab="projects">Projects</button>
        <button data-tab="companion">Companion</button>
        <button data-tab="stats">Statistics</button>
        <button data-tab="settings">Settings</button>
      </nav>

      <main id="app" aria-live="polite">
        <div class="loading">Loading Focus…</div>
      </main>
    </div>

    <dialog id="modal">
      <form method="dialog" id="modalForm">
        <div class="dialog-head">
          <div>
            <div class="eyebrow" id="modalEyebrow">Focus</div>
            <h2 id="modalTitle">Edit</h2>
          </div>
          <button value="cancel" class="close-button" aria-label="Close">×</button>
        </div>
        <div id="modalBody"></div>
        <div class="dialog-actions">
          <button value="cancel" class="secondary">Cancel</button>
          <button value="default" class="primary" id="modalSubmit">Save</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
