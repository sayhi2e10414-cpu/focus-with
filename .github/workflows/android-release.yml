name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: "8.13"
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Restore protected signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/focuswith-release.p12"
          chmod 600 "$RUNNER_TEMP/focuswith-release.p12"
      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/focuswith-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease :app:lintRelease
      - name: Verify and package APK
        run: |
          apksigner verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk
          cp android/app/build/outputs/apk/release/app-release.apk "FocusWith-Android-${GITHUB_REF_NAME}.apk"
          sha256sum "FocusWith-Android-${GITHUB_REF_NAME}.apk" > "FocusWith-Android-${GITHUB_REF_NAME}.apk.sha256"
      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "FocusWith-Android-${GITHUB_REF_NAME}.apk" \
            "FocusWith-Android-${GITHUB_REF_NAME}.apk.sha256" \
            --title "FocusWith ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --prerelease
